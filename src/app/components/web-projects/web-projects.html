<div class="py-24 px-4 bg-zinc-950 border-t border-zinc-900">
  <div class="max-w-6xl mx-auto">

    <div class="mb-16">
      <p class="text-violet-400 font-mono text-sm uppercase tracking-widest mb-3">Side Projects</p>
      <h2 class="text-3xl md:text-4xl font-bold text-white">Web Apps</h2>
      <div class="w-16 h-1 bg-violet-500 rounded-full mt-4"></div>
      <p class="text-zinc-400 mt-4 max-w-xl">Personal web projects built and deployed in my spare time.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (project of projects; track project.name) {
        <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800 hover:border-violet-500/40 hover:-translate-y-0.5 transition-all duration-200 flex flex-col gap-4">

          <!-- Icon -->
          <div class="w-10 h-10 rounded-lg bg-violet-500/10 border border-violet-500/20 flex items-center justify-center shrink-0">
            <svg class="w-5 h-5 text-violet-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.6 9h16.8M3.6 15h16.8M12 3a14.95 14.95 0 010 18M12 3a14.95 14.95 0 000 18" />
            </svg>
          </div>

          <!-- Name & description -->
          <div class="flex-1">
            <h3 class="text-base font-semibold text-white mb-1">{{ project.name }}</h3>
            <p class="text-xs text-violet-300/80 font-mono mb-3">{{ project.tagline }}</p>
            <p class="text-sm text-zinc-400 leading-relaxed">{{ project.description }}</p>
          </div>

          <!-- Tags -->
          <div class="flex flex-wrap gap-2">
            @for (tag of project.tags; track tag) {
              <span class="text-xs px-2 py-1 rounded-md bg-zinc-800 text-zinc-400 font-mono border border-zinc-700">
                {{ tag }}
              </span>
            }
          </div>

          <!-- CTAs -->
          <div class="border-t border-zinc-800 pt-4 mt-auto flex items-center gap-4">
            <a
              [href]="project.url"
              target="_blank"
              rel="noopener noreferrer"
              class="inline-flex items-center gap-1.5 text-sm text-violet-400 hover:text-violet-300 font-medium transition-colors duration-150"
            >
              Live site
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
              </svg>
            </a>
            <a
              [href]="project.githubUrl"
              target="_blank"
              rel="noopener noreferrer"
              class="inline-flex items-center gap-1.5 text-sm text-zinc-400 hover:text-zinc-200 transition-colors duration-150"
            >
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
              </svg>
              Source
            </a>
          </div>
        </div>
      }
    </div>

  </div>
</div>
