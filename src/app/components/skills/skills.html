<div class="py-24 px-4 bg-zinc-900/40">
  <div class="max-w-6xl mx-auto">

    <div class="mb-16">
      <p class="text-violet-400 font-mono text-sm uppercase tracking-widest mb-3">Tech Stack</p>
      <h2 class="text-3xl md:text-4xl font-bold text-white">Skills</h2>
      <div class="w-16 h-1 bg-violet-500 rounded-full mt-4"></div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (group of skillGroups; track group.category) {
        <div class="bg-zinc-900 rounded-xl p-6 border border-zinc-800 hover:border-zinc-700 transition-colors duration-200">
          <p class="text-violet-400 text-xs font-semibold uppercase tracking-widest mb-5">{{ group.category }}</p>
          <div class="flex flex-wrap gap-2">
            @for (skill of group.skills; track skill) {
              <span class="text-sm px-3 py-1.5 rounded-lg bg-zinc-800 text-zinc-300 border border-zinc-700 font-mono hover:border-violet-500/50 hover:text-violet-300 transition-colors duration-150 cursor-default">
                {{ skill }}
              </span>
            }
          </div>
        </div>
      }
    </div>

  </div>
</div>
